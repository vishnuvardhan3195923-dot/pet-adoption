<!DOCTYPE html>
<html>
<head>
<title>Pets</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
<h2>Pet Adoption 🐾</h2>

<ul>
<li><a href="index.html">Home</a></li>
<li><a href="pets.html">Pets 🐶</a></li>
<li><a href="orders.html">Requests 📦</a></li>
</ul>
</nav>

<h1 style="text-align:center; margin-top:40px;">Available Pets 🐾</h1>

<div id="petsContainer" style="
display:grid;
grid-template-columns:repeat(auto-fit, minmax(250px, 1fr));
gap:25px;
padding:40px;
max-width:1100px;
margin:auto;
">
</div>

<script>

// sample data (if not already set)
let pets = [
{name:"Bruno", breed:"Labrador", age:"2 years", image:"dog1.jpg"},
{name:"Max", breed:"Husky", age:"1.5 years", image:"dog2.jpg"},
{name:"Luna", breed:"Persian Cat", age:"1 year", image:"cat1.jpg"},
{name:"Kitty", breed:"Siamese Cat", age:"2 years", image:"cat2.jpg"}
];

localStorage.setItem("petsData", JSON.stringify(pets));

let container = document.getElementById("petsContainer");

pets.forEach(pet => {

let card = document.createElement("div");
card.className = "pet-card";

card.innerHTML = `
<img src="${pet.image}" style="width:100%; border-radius:12px;">
<h3>${pet.name}</h3>
<p>${pet.breed}</p>
`;

card.onclick = function(){
goToDetails(card, pet);
};

container.appendChild(card);

});

// 🔥 ANIMATION FUNCTION
function goToDetails(card, pet){

localStorage.setItem("selectedPet", JSON.stringify(pet));

// animate card
card.style.transition = "all 0.4s ease";
card.style.transform = "scale(1.1)";
card.style.boxShadow = "0 25px 60px rgba(0,0,0,0.2)";
card.style.zIndex = "999";

// fade page
document.body.style.transition = "0.4s";
document.body.style.opacity = "0.6";

// go next page
setTimeout(()=>{
window.location.href = "pet-details.html";
},400);
}

</script>

</body>
</html>
