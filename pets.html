<!DOCTYPE html>
<html>
<head>
<title>Pets</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
<h2>Pet Adoption 🐾</h2>
</nav>

<h1 style="text-align:center;">Available Pets 🐾</h1>

<div id="container" class="grid"></div>

<script>
let pets = [
{name:"Bruno", breed:"Labrador", age:"2 years", image:"dog1.jpg"},
{name:"Max", breed:"Husky", age:"1.5 years", image:"dog2.jpg"},
{name:"Luna", breed:"Cat", age:"1 year", image:"cat1.jpg"}
];

let container = document.getElementById("container");

pets.forEach(p=>{
let card=document.createElement("div");
card.className="card";

card.innerHTML=`
<img src="${p.image}">
<div class="card-content">
<h3>${p.name}</h3>
<p>${p.breed}</p>
</div>
`;

card.onclick=()=>{
localStorage.setItem("selectedPet",JSON.stringify(p));
window.location.href="pet-details.html";
};

container.appendChild(card);
});
</script>

</body>
</html>
