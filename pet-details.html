<!DOCTYPE html>
<html>
<head>
    <title>Pet Details</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <h2>Pet Adoption 🐾</h2>
</nav>

<div id="pet-details" style="text-align:center; padding:40px;"></div>

<script>
let pet = JSON.parse(localStorage.getItem("selectedPet"));

if(pet){
    document.getElementById("pet-details").innerHTML = `
        <img src="${pet.image}" style="width:300px; border-radius:12px;">
        <h1>${pet.name}</h1>
        <p>${pet.breed}</p>
        <p>${pet.age}</p>
        <a href="contact.html"><button>Adopt Now</button></a>
    `;
}
</script>

</body>
</html>
