<!DOCTYPE html>
<html>
<head>
<title>Pet Details</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav><h2>Pet Adoption 🐾</h2></nav>

<div style="max-width:600px;margin:40px auto;">

<div class="card">

<img id="img">

<div class="card-content" style="text-align:center;">
<h2 id="name"></h2>
<p id="breed"></p>
<p id="age"></p>

<button onclick="go()">Adopt 💛</button>
</div>

</div>

</div>

<script>
let p=JSON.parse(localStorage.getItem("selectedPet"));

document.getElementById("img").src=p.image;
document.getElementById("name").innerText=p.name;
document.getElementById("breed").innerText=p.breed;
document.getElementById("age").innerText=p.age;

function go(){
window.location.href="contact.html";
}
</script>

</body>
</html>
