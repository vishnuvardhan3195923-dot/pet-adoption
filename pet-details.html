<!DOCTYPE html>
<html>
<head>
<title>Pet Details</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
<h2>Pet Adoption 🐾</h2>
</nav>

<div class="details-container" id="pet-details"></div>

<script>
let pet = JSON.parse(localStorage.getItem("selectedPet"));

if(pet){
document.getElementById("pet-details").innerHTML = `
<div class="details-card">

<img src="${pet.image}" class="details-img">

<div class="details-content">
<h1>🐶 ${pet.name}</h1>
<p><b>Breed:</b> ${pet.breed}</p>
<p><b>Age:</b> ${pet.age}</p>

<a href="contact.html">
<button>Adopt ${pet.name} 💛</button>
</a>
</div>

</div>
`;
}
</script>

</body>
</html>
