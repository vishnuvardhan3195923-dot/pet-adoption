<html>

</head>

<div class="user-area">

<script>
let user = localStorage.getItem("user");

if(user){
document.getElementById("userDisplay").innerText = "👋 Hello, " + user + " 😊";
document.getElementById("loginBtn").style.display = "none";
} else {
document.getElementById("userDisplay").innerText = "👋 Welcome 😊";
document.getElementById("logoutBtn").style.display = "none";
}

function logout(){
localStorage.removeItem("user");
location.reload();
}
</script>
