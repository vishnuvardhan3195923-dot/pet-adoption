<!DOCTYPE html>
<html>
<head>
<title>Adopt Pet</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
<h2>Pet Adoption 🐾</h2>
</nav>

<h1>💌 Adopt Your Pet</h1>

<form id="form" style="
background:white;
padding:35px;
border-radius:18px;
box-shadow:0 15px 40px rgba(0,0,0,0.08);
max-width:450px;
margin:60px auto;
">

<input 
id="name" 
placeholder="Your Name"
required
style="border-radius:14px; padding:14px; font-size:1rem;"
>

<input 
id="pet" 
readonly
style="border-radius:14px; padding:14px; font-size:1rem;"
>

<textarea 
id="message" 
placeholder="Why do you want to adopt this pet?"
required
style="border-radius:14px; padding:14px; font-size:1rem; min-height:120px;"
></textarea>

<button type="submit">Submit Request 🚀</button>

</form>

<script>
let pet = JSON.parse(localStorage.getItem("selectedPet"));
if(pet){
document.getElementById("pet").value = pet.name;
}

document.getElementById("form").onsubmit = function(e){
e.preventDefault();

let name = document.getElementById("name").value;
let petName = document.getElementById("pet").value;
let message = document.getElementById("message").value;

let orders = JSON.parse(localStorage.getItem("orders")) || [];
orders.push({name, petName, message});
localStorage.setItem("orders", JSON.stringify(orders));

window.location.href = "success.html";
};
</script>

</body>
</html>
