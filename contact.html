<!DOCTYPE html>
<html>
<head>
<title>Contact</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav><h2>Pet Adoption 🐾</h2></nav>

<h1>Adopt Pet</h1>

<form id="form">
<input id="name" placeholder="Name" required>
<input id="email" placeholder="Email" required>
<input id="pet" readonly>
<button>Send Request</button>
</form>

<script>
let pet = JSON.parse(localStorage.getItem("selectedPet"));
if(pet){
document.getElementById("pet").value = pet.name;
}

document.getElementById("form").onsubmit = function(e){
e.preventDefault();

let name = document.getElementById("name").value;
let email = document.getElementById("email").value;
let petName = document.getElementById("pet").value;

// save history
let orders = JSON.parse(localStorage.getItem("orders")) || [];
orders.push({name,email,petName});
localStorage.setItem("orders", JSON.stringify(orders));

// open mail
window.location.href =
`mailto:vishnuvardhan3195923@gmail.com?subject=Pet Adoption&body=Pet: ${petName}%0AName: ${name}%0AEmail: ${email}`;

// success page
setTimeout(()=>{window.location.href="success.html"},1000);
}
</script>

</body>
</html>
