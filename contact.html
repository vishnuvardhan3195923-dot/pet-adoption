<!DOCTYPE html>
<html>
<head>
    <title>Contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <h2>Pet Adoption 🐾</h2>
</nav>

<h1>Adopt Pet</h1>

<form id="contactForm">
    <input type="text" id="name" placeholder="Your Name" required>
    <input type="email" id="email" placeholder="Your Email" required>
    <input type="text" id="pet" placeholder="Pet Name" readonly>
    <textarea placeholder="Message"></textarea>
    <button type="submit">Send Request</button>
</form>

<script>
let pet = JSON.parse(localStorage.getItem("selectedPet"));
if(pet){
    document.getElementById("pet").value = pet.name;
}

document.getElementById("contactForm").onsubmit = function(e){
    e.preventDefault();

    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let petName = document.getElementById("pet").value;

    // 👇 ADD THIS LINE
    alert("Opening your mail app to send request 🚀");

    window.location.href = `mailto:vishnuvardhan3195923@gmail.com?subject=Pet Adoption Request&body=Hello,%0A%0AI would like to adopt:%0APet: ${petName}%0AName: ${name}%0AEmail: ${email}`;
};
</script>

</body>
</html>
