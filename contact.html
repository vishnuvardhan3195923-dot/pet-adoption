<!DOCTYPE html>
<html>
<head>
<title>Adopt Pet</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
<h2>Pet Adoption 🐾</h2>
</nav>

<h1>💌 Adopt Your Pet</h1>

<form id="form">
<input id="name" placeholder="Your Name" required>
<input id="pet" readonly>
<textarea id="message" placeholder="Why do you want to adopt this pet?" required></textarea>
<button type="submit">Submit Request 🚀</button>
</form>

<script>
let pet = JSON.parse(localStorage.getItem("selectedPet"));
if(pet){
document.getElementById("pet").value = pet.name;
}

document.getElementById("form").onsubmit = function(e){
e.preventDefault();

let name = document.getElementById("name").value;
let petName = document.getElementById("pet").value;
let message = document.getElementById("message").value;

let orders = JSON.parse(localStorage.getItem("orders")) || [];
orders.push({name, petName, message});
localStorage.setItem("orders", JSON.stringify(orders));

window.location.href = "success.html";
};
</script>

</body>
</html>
