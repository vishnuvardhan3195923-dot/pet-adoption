<!DOCTYPE html>
<html>
<head>
<title>Contact</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav><h2>Pet Adoption 🐾</h2></nav>

<h1 style="text-align:center;">Adopt Pet 💌</h1>

<form id="form">

<input id="name" placeholder="Your Name" required>
<input id="pet" readonly>
<textarea id="msg" placeholder="Your message"></textarea>

<button>Submit</button>

</form>

<script>
let p=JSON.parse(localStorage.getItem("selectedPet"));
if(p){document.getElementById("pet").value=p.name;}

document.getElementById("form").onsubmit=e=>{
e.preventDefault();

let name=document.getElementById("name").value;
let pet=document.getElementById("pet").value;
let msg=document.getElementById("msg").value;

window.location.href=`mailto:vishnuvardhan3195923@gmail.com?subject=Adopt&body=${name} wants ${pet} - ${msg}`;

setTimeout(()=>location.href="success.html",500);
};
</script>

</body>
</html>
